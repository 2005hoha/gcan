# --- QMIX for MPE environments ---
# Key difference from default QMIX config:
#   target_update_interval_or_tau: 800 (not 200)
#   Reason: RES paper (NeurIPS 2021) proved MPE needs larger target update
#   interval to prevent catastrophic overestimation bias.

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000
evaluation_epsilon: 0.0

runner: "episode"

buffer_size: 5000

# CRITICAL: RES paper shows MPE needs 800, not SMAC default 200
target_update_interval_or_tau: 800

obs_agent_id: True
obs_last_action: False
obs_individual_obs: False

standardise_returns: False
standardise_rewards: True

agent_output_type: "q"
learner: "q_learner"
double_q: True
mixer: "qmix"
use_rnn: False
mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64

name: "qmix_mpe"
